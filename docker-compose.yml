version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: Support01!
      POSTGRES_DB: ai_media
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  minio:
    image: minio/minio:latest
    container_name: ai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: Support01!
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: domdenysov@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Support01!
    ports:
      - "5050:80"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
